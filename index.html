<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, shrink-to-fit=no">
    <title>Bee Fly - Canos Coloridos</title>
    
    <meta name="theme-color" content="#4A90E2">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    
    <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🐝</text></svg>">
    <link rel="apple-touch-icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>🐝</text></svg>">

    <style>
        /* ===== ESTILOS ===== */
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            user-select: none;
            -webkit-user-select: none;
            -webkit-touch-callout: none;
        }

        body, html {
            width: 100%;
            height: 100%;
            overflow: hidden;
            background-color: #1a1a1a;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        #game-container {
            position: relative;
            width: 100%;
            height: 100%;
            max-width: 480px; 
            max-height: 850px;
            box-shadow: 0 0 20px rgba(0,0,0,0.8);
            overflow: hidden;
        }

        canvas {
            width: 100%;
            height: 100%;
            display: block;
            background: #4A90E2;
            touch-action: none;
        }

        #ui-layer {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
        }

        .screen {
            position: absolute;
            width: 85%;
            max-width: 360px;
            background: rgba(255, 255, 255, 0.95);
            border-radius: 20px;
            padding: 30px 20px;
            text-align: center;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            display: none;
            flex-direction: column;
            gap: 15px;
            pointer-events: auto;
            touch-action: auto;
            transform: scale(0.9);
            transition: transform 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        .screen.active {
            display: flex;
            transform: scale(1);
        }

        .logo {
            font-size: 3rem;
            color: #F5A623;
            text-shadow: 3px 3px 0px #4A4A4A, -1px -1px 0px #4A4A4A, 1px -1px 0px #4A4A4A, -1px 1px 0px #4A4A4A;
            font-weight: 900;
            letter-spacing: 2px;
            animation: floatLogo 3s ease-in-out infinite;
        }

        .title-danger {
            color: #D0021B;
            font-size: 2.2rem;
            text-transform: uppercase;
            font-weight: 800;
        }

        .highscore-text {
            font-size: 1.1rem;
            color: #4A4A4A;
            font-weight: 600;
        }

        .btn {
            padding: 15px 30px;
            font-size: 1.3rem;
            font-weight: bold;
            color: #fff;
            background: #F5A623;
            border: none;
            border-bottom: 5px solid #D48400;
            border-radius: 50px;
            cursor: pointer;
            transition: all 0.1s ease;
            outline: none;
        }

        .btn:active {
            transform: translateY(3px);
            border-bottom-width: 2px;
        }

        .btn-secondary {
            background: #4A90E2;
            border-bottom: 5px solid #2860A2;
            font-size: 1.1rem;
            padding: 10px 20px;
        }

        .score-board {
            background: #FFF7E6;
            border: 3px solid #F5A623;
            border-radius: 12px;
            padding: 15px;
            font-size: 1.2rem;
            font-weight: bold;
            color: #4A4A4A;
        }

        #medal-container {
            margin-top: 10px;
            font-size: 3rem;
        }

        #hud {
            position: absolute;
            top: 40px;
            left: 0;
            width: 100%;
            padding: 0 20px;
            display: none;
            justify-content: center;
            align-items: center;
            pointer-events: none;
            color: #fff;
            text-shadow: 2px 2px 0 #000, -1px -1px 0 #000;
            font-weight: 900;
        }

        #hud .score {
            font-size: 4rem;
        }

        .achievement-item {
            display: flex;
            align-items: center;
            gap: 10px;
            background: #f0f0f0;
            padding: 8px 12px;
            border-radius: 8px;
            margin-bottom: 8px;
            border-left: 5px solid #ccc;
        }

        .achievement-item.unlocked {
            border-left-color: #50E3C2;
            background: #E6F9F5;
        }

        .achievement-item.unlocked .ach-icon {
            filter: grayscale(0%);
        }

        .achievement-item .ach-icon {
            font-size: 1.5rem;
            filter: grayscale(100%);
        }

        .achievement-info h4 {
            font-size: 0.95rem;
            color: #333;
        }

        .achievement-info p {
            font-size: 0.8rem;
            color: #666;
        }

        #achievements-list {
            max-height: 250px;
            overflow-y: auto;
            text-align: left;
            padding: 5px;
        }

        @keyframes floatLogo {
            0% { transform: translateY(0px); }
            50% { transform: translateY(-10px); }
            100% { transform: translateY(0px); }
        }

        .shake {
            animation: shakeEffect 0.2s cubic-bezier(.36,.07,.19,.97) both;
        }

        @keyframes shakeEffect {
            10%, 90% { transform: translate3d(-2px, 0, 0); }
            20%, 80% { transform: translate3d(4px, 0, 0); }
            30%, 50%, 70% { transform: translate3d(-6px, 0, 0); }
            40%, 60% { transform: translate3d(6px, 0, 0); }
        }
    </style>
</head>
<body>

<div id="game-container">
    <canvas id="gameCanvas"></canvas>

    <div id="ui-layer">
        <div id="menu-screen" class="screen active">
            <h1 class="logo">Bee Fly</h1>
            <p class="highscore-text">Melhor Pontuação: <span id="menu-highscore">0</span></p>
            <button id="start-btn" class="btn">Jogar</button>
            <button id="achievements-btn" class="btn btn-secondary">Conquistas</button>
        </div>

        <div id="gameover-screen" class="screen">
            <h2 class="title-danger">Fim de Jogo</h2>
            <div class="score-board">
                <p>Pontos: <span id="final-score">0</span></p>
                <p>Melhor: <span id="final-highscore">0</span></p>
                <div id="medal-container"></div>
            </div>
            <button id="restart-btn" class="btn">Jogar Novamente</button>
            <button id="back-menu-btn" class="btn btn-secondary">Menu Principal</button>
        </div>

        <div id="achievements-screen" class="screen">
            <h2>Conquistas</h2>
            <div id="achievements-list"></div>
            <button id="close-achievements-btn" class="btn btn-secondary">Voltar</button>
        </div>

        <div id="hud">
            <span class="score" id="current-score">0</span>
        </div>
    </div>
</div>

<script>
    // ================================================================
    //  MOTOR DO JOGO – VELOCIDADE PROGRESSIVA (2.0 → 5.0)
    // ================================================================

    const canvas = document.getElementById('gameCanvas');
    const ctx = canvas.getContext('2d');
    const container = document.getElementById('game-container');

    // Seletores UI
    const menuScreen = document.getElementById('menu-screen');
    const gameoverScreen = document.getElementById('gameover-screen');
    const achievementsScreen = document.getElementById('achievements-screen');
    const hud = document.getElementById('hud');
    const menuHighscore = document.getElementById('menu-highscore');
    const finalScore = document.getElementById('final-score');
    const finalHighscore = document.getElementById('final-highscore');
    const currentScoreElement = document.getElementById('current-score');
    const medalContainer = document.getElementById('medal-container');
    const achievementsList = document.getElementById('achievements-list');

    // Estado
    let gameState = 'MENU';
    let score = 0;
    let highscore = localStorage.getItem('beefly_highscore') ? parseInt(localStorage.getItem('beefly_highscore')) : 0;
    let animationFrameId;

    // Entidades
    let bee;
    let obstacles = [];
    let particles = [];
    let clouds = [];
    let flowers = [];

    // Dimensões virtuais
    const V_WIDTH = 400;
    const V_HEIGHT = 700;

    // Conquistas
    let achievements = localStorage.getItem('beefly_achievements') ? JSON.parse(localStorage.getItem('beefly_achievements')) : {
        first_flight: { id: 'first_flight', title: 'Primeiro Voo', desc: 'Iniciou sua jornada aérea', unlocked: false, icon: '🌱' },
        score_10: { id: 'score_10', title: 'Polinizador Júnior', desc: 'Marcou 10 pontos', unlocked: false, icon: '🌸' },
        score_30: { id: 'score_30', title: 'Mestre da Colmeia', desc: 'Marcou 30 pontos', unlocked: false, icon: '🍯' },
        score_50: { id: 'score_50', title: 'Abelha Supersônica', desc: 'Marcou 50 pontos', unlocked: false, icon: '⚡' }
    };

    // ========== FUNÇÕES AUXILIARES ==========
    function addMenuEvent(elementId, callback) {
        const el = document.getElementById(elementId);
        el.addEventListener('click', (e) => { e.stopPropagation(); callback(e); });
        el.addEventListener('touchstart', (e) => { e.stopPropagation(); callback(e); }, { passive: true });
    }

    addMenuEvent('start-btn', startGame);
    addMenuEvent('restart-btn', restartGame);
    addMenuEvent('back-menu-btn', backToMenu);
    addMenuEvent('achievements-btn', showAchievements);
    addMenuEvent('close-achievements-btn', hideAchievements);

    function resizeCanvas() {
        canvas.width = V_WIDTH;
        canvas.height = V_HEIGHT;
    }
    window.addEventListener('resize', resizeCanvas);
    resizeCanvas();

    // ========== INICIALIZAÇÃO ==========
    function initBackgroundDecorations() {
        clouds = [];
        flowers = [];
        for (let i = 0; i < 4; i++) {
            clouds.push({
                x: Math.random() * V_WIDTH,
                y: Math.random() * 200 + 50,
                size: Math.random() * 30 + 20,
                speed: Math.random() * 0.2 + 0.1
            });
        }
        for (let i = 0; i < V_WIDTH; i += 40) {
            flowers.push({
                x: i + Math.random() * 15,
                y: V_HEIGHT - 35,
                color: ['#FF6B6B', '#F4D03F', '#D1F2A5', '#FF9F43'][Math.floor(Math.random() * 4)],
                height: Math.random() * 10 + 10
            });
        }
    }

    function createBee() {
        return {
            x: 80,
            y: V_HEIGHT / 2,
            radius: 16,
            velocity: 0,
            gravity: 0.35,
            jump: -6.8,
            wingAngle: 0,
            wingDirection: 1,
            hoverOffset: 0,
            hoverSpeed: 0.05
        };
    }

    // ========== SPAWN DE OBSTÁCULOS ==========
    function spawnObstacle() {
        // Gap: 400px → 120px
        const baseGap = 400;
        const minGap = 120;
        const gapReduction = Math.min(score * 1.0, baseGap - minGap);
        const currentGap = baseGap - gapReduction;

        const minHeight = 60;
        const maxHeight = V_HEIGHT - currentGap - 100;
        const topHeight = Math.floor(Math.random() * (maxHeight - minHeight + 1)) + minHeight;
        const bottomHeight = V_HEIGHT - currentGap - topHeight - 30;

        let nextSpawnDelay = 130 + Math.random() * 40;
        if (score > 15) nextSpawnDelay -= 20;

        // ⬆️ NOVA VELOCIDADE: começa em 2.0, sobe 0.08 por ponto, máximo 5.0
        const speed = 2.0 + Math.min(score * 0.08, 3.0);

        const colors = ['#2E7D32', '#1565C0', '#C62828', '#6A1B9A', '#E65100'];
        const color = colors[Math.floor(Math.random() * colors.length)];
        const lightColor = color + '99';

        obstacles.push({
            x: V_WIDTH,
            topHeight: topHeight,
            bottomHeight: bottomHeight,
            gap: currentGap,
            width: 65,
            speed: speed,
            passed: false,
            nextSpawn: nextSpawnDelay,
            color: color,
            lightColor: lightColor
        });
    }

    // ========== DETECÇÃO DE COLISÃO ==========
    function detectCollision(circle, rect) {
        const padding = 4;
        const rX = circle.x;
        const rY = circle.y;
        const rRad = circle.radius - padding;

        let topLog = { x: rect.x, y: 0, w: rect.width, h: rect.topHeight };
        let botLog = { x: rect.x, y: V_HEIGHT - rect.bottomHeight - 30, w: rect.width, h: rect.bottomHeight };

        return checkCircleRectCollision(rX, rY, rRad, topLog) || checkCircleRectCollision(rX, rY, rRad, botLog);
    }

    function checkCircleRectCollision(cx, cy, radius, rect) {
        let closestX = Math.max(rect.x, Math.min(cx, rect.x + rect.w));
        let closestY = Math.max(rect.y, Math.min(cy, rect.y + rect.h));
        let distanceX = cx - closestX;
        let distanceY = cy - closestY;
        return (distanceX * distanceX + distanceY * distanceY) < (radius * radius);
    }

    // ========== PARTÍCULAS ==========
    function createScoreParticles(x, y) {
        for (let i = 0; i < 15; i++) {
            particles.push({
                x: x,
                y: y,
                vx: (Math.random() - 0.5) * 6,
                vy: (Math.random() - 0.5) * 6,
                radius: Math.random() * 4 + 2,
                color: `rgba(245, 166, 35, ${Math.random() * 0.5 + 0.5})`,
                alpha: 1,
                decay: Math.random() * 0.02 + 0.01
            });
        }
    }

    // ========== LOOP PRINCIPAL ==========
    function update() {
        ctx.clearRect(0, 0, V_WIDTH, V_HEIGHT);

        drawBackground();

        if (gameState === 'PLAYING') {
            // Física da abelha
            bee.velocity += bee.gravity;
            bee.y += bee.velocity;
            bee.wingAngle += 0.4 * bee.wingDirection;
            if (Math.abs(bee.wingAngle) > 1) bee.wingDirection *= -1;

            // Limites
            if (bee.y - bee.radius < 0) {
                bee.y = bee.radius;
                bee.velocity = 0;
            }
            if (bee.y + bee.radius >= V_HEIGHT - 30) {
                triggerGameOver();
                return;
            }

            // Spawn de obstáculos
            if (obstacles.length === 0) {
                spawnObstacle();
            } else {
                let last = obstacles[obstacles.length - 1];
                if (V_WIDTH - last.x >= last.nextSpawn) {
                    spawnObstacle();
                }
            }

            // Atualiza obstáculos
            for (let i = obstacles.length - 1; i >= 0; i--) {
                let obs = obstacles[i];
                obs.x -= obs.speed;

                if (!obs.passed && obs.x + obs.width / 2 < bee.x) {
                    obs.passed = true;
                    score++;
                    currentScoreElement.innerText = score;
                    createScoreParticles(bee.x + 30, bee.y);
                    checkScoreAchievements();
                }

                if (obs.x + obs.width < 0) {
                    obstacles.splice(i, 1);
                    continue;
                }

                if (detectCollision(bee, obs)) {
                    triggerGameOver();
                    return;
                }
            }

            // Atualiza partículas
            for (let i = particles.length - 1; i >= 0; i--) {
                let p = particles[i];
                p.x += p.vx; p.y += p.vy;
                p.alpha -= p.decay;
                if (p.alpha <= 0) particles.splice(i, 1);
            }

        } else if (gameState === 'MENU') {
            bee.hoverOffset += bee.hoverSpeed;
            bee.y = (V_HEIGHT / 2) + Math.sin(bee.hoverOffset) * 12;
            bee.wingAngle += 0.15;
        }

        drawObstacles();
        drawParticles();
        drawGround();
        drawBee();

        animationFrameId = requestAnimationFrame(update);
    }

    // ========== FUNÇÕES DE DESENHO ==========

    function drawBackground() {
        let skyGrad = ctx.createLinearGradient(0, 0, 0, V_HEIGHT);
        skyGrad.addColorStop(0, '#73C2FB');
        skyGrad.addColorStop(1, '#A5D6A7');
        ctx.fillStyle = skyGrad;
        ctx.fillRect(0, 0, V_WIDTH, V_HEIGHT);

        ctx.fillStyle = 'rgba(255, 255, 255, 0.85)';
        clouds.forEach(cloud => {
            if (gameState === 'PLAYING') cloud.x -= cloud.speed;
            if (cloud.x + cloud.size * 2 < 0) cloud.x = V_WIDTH + cloud.size;
            ctx.beginPath();
            ctx.arc(cloud.x, cloud.y, cloud.size, 0, Math.PI * 2);
            ctx.arc(cloud.x + cloud.size * 0.6, cloud.y - cloud.size * 0.4, cloud.size * 0.8, 0, Math.PI * 2);
            ctx.arc(cloud.x + cloud.size * 1.2, cloud.y, cloud.size * 0.6, 0, Math.PI * 2);
            ctx.fill();
        });
    }

    function drawGround() {
        ctx.fillStyle = '#558B2F';
        ctx.fillRect(0, V_HEIGHT - 30, V_WIDTH, 30);
        ctx.fillStyle = '#8D6E63';
        ctx.fillRect(0, V_HEIGHT - 8, V_WIDTH, 8);

        flowers.forEach(flower => {
            ctx.fillStyle = '#7CB342';
            ctx.fillRect(flower.x, flower.y, 3, flower.height);
            ctx.fillStyle = flower.color;
            ctx.beginPath();
            ctx.arc(flower.x + 1, flower.y, 5, 0, Math.PI * 2);
            ctx.fill();
            ctx.fillStyle = '#FFF';
            ctx.beginPath();
            ctx.arc(flower.x + 1, flower.y, 2, 0, Math.PI * 2);
            ctx.fill();
        });
    }

    function drawObstacles() {
        obstacles.forEach(obs => {
            const color = obs.color;
            const lightColor = obs.lightColor;

            // Cano superior
            ctx.fillStyle = color;
            ctx.strokeStyle = '#1a1a1a';
            ctx.lineWidth = 3;
            ctx.beginPath();
            ctx.rect(obs.x, 0, obs.width, obs.topHeight);
            ctx.fill();
            ctx.stroke();

            // Detalhe do topo do cano superior
            ctx.fillStyle = lightColor;
            ctx.fillRect(obs.x - 4, obs.topHeight - 24, obs.width + 8, 24);
            ctx.strokeRect(obs.x - 4, obs.topHeight - 24, obs.width + 8, 24);

            // Cano inferior
            let botY = V_HEIGHT - obs.bottomHeight - 30;
            ctx.fillStyle = color;
            ctx.beginPath();
            ctx.rect(obs.x, botY, obs.width, obs.bottomHeight);
            ctx.fill();
            ctx.stroke();

            ctx.fillStyle = lightColor;
            ctx.fillRect(obs.x - 4, botY, obs.width + 8, 24);
            ctx.strokeRect(obs.x - 4, botY, obs.width + 8, 24);
        });
    }

    function drawParticles() {
        particles.forEach(p => {
            ctx.globalAlpha = p.alpha;
            ctx.fillStyle = p.color;
            ctx.beginPath();
            ctx.arc(p.x, p.y, p.radius, 0, Math.PI * 2);
            ctx.fill();
        });
        ctx.globalAlpha = 1;
    }

    function drawBee() {
        ctx.save();
        ctx.translate(bee.x, bee.y);

        // Corpo amarelo
        const bodyColor = '#FFEB3B';
        const stripeColor = '#212121';

        // Pernas
        ctx.strokeStyle = '#212121';
        ctx.lineWidth = 3;
        ctx.lineCap = 'round';
        ctx.beginPath();
        ctx.moveTo(-4, 10); ctx.lineTo(-6, 16);
        ctx.moveTo(4, 10); ctx.lineTo(4, 16);
        ctx.stroke();

        // Corpo
        ctx.fillStyle = bodyColor;
        ctx.beginPath();
        ctx.ellipse(0, 0, 20, 15, 0, 0, Math.PI * 2);
        ctx.fill();
        ctx.lineWidth = 1.5;
        ctx.strokeStyle = '#212121';
        ctx.stroke();

        // Listras
        ctx.fillStyle = stripeColor;
        ctx.beginPath();
        ctx.ellipse(-6, 0, 5, 13.8, 0, 0, Math.PI * 2);
        ctx.fill();
        ctx.beginPath();
        ctx.ellipse(2, 0, 5, 14.8, 0, 0, Math.PI * 2);
        ctx.fill();

        // Ferrão
        ctx.fillStyle = '#212121';
        ctx.beginPath();
        ctx.moveTo(-20, -2); ctx.lineTo(-27, 0); ctx.lineTo(-20, 4);
        ctx.closePath();
        ctx.fill();

        // Olho
        ctx.fillStyle = '#FFFFFF';
        ctx.beginPath();
        ctx.arc(10, -4, 6, 0, Math.PI * 2);
        ctx.fill();
        ctx.stroke();
        ctx.fillStyle = '#000000';
        ctx.beginPath();
        ctx.arc(12, -4, 2.5, 0, Math.PI * 2);
        ctx.fill();
        ctx.fillStyle = '#FFFFFF';
        ctx.beginPath();
        ctx.arc(11, -5, 0.8, 0, Math.PI * 2);
        ctx.fill();

        // Antena
        ctx.strokeStyle = '#212121';
        ctx.lineWidth = 2;
        ctx.beginPath();
        ctx.moveTo(8, -12);
        ctx.quadraticCurveTo(14, -20, 18, -18);
        ctx.stroke();

        // Asas
        ctx.fillStyle = 'rgba(224, 247, 250, 0.7)';
        ctx.strokeStyle = 'rgba(255, 255, 255, 0.9)';
        ctx.lineWidth = 2;
        ctx.shadowBlur = 0;

        ctx.save();
        ctx.translate(-5, -12);
        ctx.rotate(bee.wingAngle * 0.6 - 0.2);
        ctx.beginPath();
        ctx.ellipse(0, -10, 6, 14, Math.PI / 12, 0, Math.PI * 2);
        ctx.fill(); ctx.stroke();
        ctx.restore();

        ctx.save();
        ctx.translate(-2, -14);
        ctx.rotate(bee.wingAngle);
        ctx.beginPath();
        ctx.ellipse(0, -14, 8, 18, -Math.PI / 12, 0, Math.PI * 2);
        ctx.fill(); ctx.stroke();
        ctx.restore();

        ctx.restore();
    }

    // ========== FIM DE JOGO ==========
    function triggerGameOver() {
        gameState = 'GAMEOVER';
        hud.style.display = 'none';
        container.classList.add('shake');
        setTimeout(() => container.classList.remove('shake'), 200);

        if (score > highscore) {
            highscore = score;
            localStorage.setItem('beefly_highscore', highscore);
        }

        finalScore.innerText = score;
        finalHighscore.innerText = highscore;

        let medalEmoji = '';
        if (score >= 50) medalEmoji = '💎 <br><span style="font-size:1rem; color:#4A90E2;">Diamante</span>';
        else if (score >= 30) medalEmoji = '🥇 <br><span style="font-size:1rem; color:#F5A623;">Ouro</span>';
        else if (score >= 15) medalEmoji = '🥈 <br><span style="font-size:1rem; color:#9B9B9B;">Prata</span>';
        else if (score >= 5) medalEmoji = '🥉 <br><span style="font-size:1rem; color:#CD7F32;">Bronze</span>';
        else medalEmoji = '❌ <br><span style="font-size:1rem; color:#999;">Sem Medalha</span>';

        medalContainer.innerHTML = medalEmoji;
        gameoverScreen.classList.add('active');
    }

    // ========== CONQUISTAS ==========
    function checkScoreAchievements() {
        if (score >= 10) unlockAchievement('score_10');
        if (score >= 30) unlockAchievement('score_30');
        if (score >= 50) unlockAchievement('score_50');
    }

    function unlockAchievement(id) {
        if (achievements[id] && !achievements[id].unlocked) {
            achievements[id].unlocked = true;
            localStorage.setItem('beefly_achievements', JSON.stringify(achievements));
        }
    }

    // ========== CONTROLES DE TELA ==========
    function startGame() {
        gameState = 'PLAYING';
        score = 0;
        obstacles = [];
        particles = [];
        currentScoreElement.innerText = score;

        menuScreen.classList.remove('active');
        gameoverScreen.classList.remove('active');
        achievementsScreen.classList.remove('active');
        hud.style.display = 'flex';

        bee = createBee();
        initBackgroundDecorations();
        unlockAchievement('first_flight');

        cancelAnimationFrame(animationFrameId);
        animationFrameId = requestAnimationFrame(update);
    }

    function restartGame() {
        startGame();
    }

    function backToMenu() {
        gameState = 'MENU';
        gameoverScreen.classList.remove('active');
        menuScreen.classList.add('active');
        hud.style.display = 'none';
        menuHighscore.innerText = highscore;
        initBackgroundDecorations();
        cancelAnimationFrame(animationFrameId);
        animationFrameId = requestAnimationFrame(update);
    }

    function showAchievements() {
        menuScreen.classList.remove('active');
        achievementsScreen.classList.add('active');
        achievementsList.innerHTML = '';
        Object.values(achievements).forEach(ach => {
            const item = document.createElement('div');
            item.className = `achievement-item ${ach.unlocked ? 'unlocked' : ''}`;
            item.innerHTML = `
                <div class="ach-icon">${ach.icon}</div>
                <div class="achievement-info">
                    <h4>${ach.title}</h4>
                    <p>${ach.desc}</p>
                </div>
            `;
            achievementsList.appendChild(item);
        });
    }

    function hideAchievements() {
        achievementsScreen.classList.remove('active');
        menuScreen.classList.add('active');
    }

    // ========== EVENTO DE PULO ==========
    function handleJump(e) {
        if (e && e.target.tagName === 'BUTTON') return;
        if (e && e.cancelable) e.preventDefault();
        if (gameState === 'PLAYING') {
            bee.velocity = bee.jump;
        }
    }
    window.addEventListener('touchstart', handleJump, { passive: false });
    window.addEventListener('mousedown', (e) => {
        if (e.target.tagName !== 'BUTTON') handleJump(null);
    });

    // ========== INICIALIZAÇÃO ==========
    menuHighscore.innerText = highscore;
    initBackgroundDecorations();
    bee = createBee();
    animationFrameId = requestAnimationFrame(update);
</script>
</body>
</html>
